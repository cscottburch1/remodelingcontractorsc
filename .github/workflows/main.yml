name: Deploy Next.js to Hostinger

on:
  push:
    branches:
      - main  # Or whichever branch you want to trigger the deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" # Load nvm
            cd /var/www/remodelingcontractorsc             # Path to your project
            git pull origin main
            npm install
            npm run build
            pm2 restart next-app                           # Replace with your PM2 process name
