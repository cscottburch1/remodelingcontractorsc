name: Auto Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger VPS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 72.60.166.68
          username: root
          password: ${{ secrets.SERVER_SSH_PASSWORD }}
          port: 22
          command_timeout: 25m
          env: |
            INDEX_NOW_KEY=${{ secrets.INDEX_NOW_KEY }}
            SITE_URL=https://remodelingcontractorsc.com
          script: |
            set -euo pipefail

            APP_PATH="/var/www/remodelingcontractorsc"
            PM2_PROCESS="remodelingcontractorsc"

            if [ "$APP_PATH" != "/var/www/remodelingcontractorsc" ]; then
              echo "Refusing deploy: unexpected APP_PATH $APP_PATH"
              exit 1
            fi

            if [ "$PM2_PROCESS" != "remodelingcontractorsc" ]; then
              echo "Refusing deploy: unexpected PM2 process $PM2_PROCESS"
              exit 1
            fi

            if [ ! -d "$APP_PATH" ]; then
              echo "Refusing deploy: app path not found: $APP_PATH"
              exit 1
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "Deploy failed: node is not installed or not in PATH"
              exit 1
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "Deploy failed: npm is not installed or not in PATH"
              exit 1
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "Deploy failed: pm2 is not installed or not in PATH"
              exit 1
            fi

            node -v
            npm -v
            pm2 -v

            cd /var/www/remodelingcontractorsc
            git fetch origin main
            git checkout main
            git pull origin main
            rm -rf .next .swc
            npm ci --production=false
            npm run build
            pm2 restart remodelingcontractorsc
            pm2 save
            
            # Submit to Index Now if key is configured
            if [ -n "${INDEX_NOW_KEY:-}" ]; then
              echo "📤 Notifying search engines via Index Now..."
              node scripts/submit-to-index-now.mjs || echo "⚠️  Index Now notification failed (non-fatal)"
            else
              echo "⚠️  INDEX_NOW_KEY not configured, skipping Index Now submission"
            fi
            
            echo "✅ Auto-deploy completed at $(date)"
